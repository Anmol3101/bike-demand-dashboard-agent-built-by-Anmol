<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard for Bike Demand UIUC</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e4e6ed;
  --muted: #8b8fa3;
  --accent: #6366f1;
  --accent2: #22d3ee;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --pink: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.dashboard { max-width:1400px; margin:0 auto; padding:20px; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
header h1 { font-size:22px; font-weight:700; }
header h1 span { color:var(--accent); }
.filters { display:flex; gap:10px; flex-wrap:wrap; }
.filters select { background:var(--card); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; outline:none; }
.filters select:hover { border-color:var(--accent); }
.kpis { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.kpi .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.kpi .value { font-size:28px; font-weight:700; }
.kpi .sub { font-size:12px; margin-top:6px; }
.kpi .up { color:var(--green); }
.kpi .down { color:var(--red); }
.charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
.chart-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.chart-card h3 { font-size:14px; color:var(--muted); margin-bottom:16px; font-weight:500; }
.chart-card.full { grid-column: 1 / -1; }
.table-section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; overflow-x:auto; }
.table-section h3 { font-size:14px; color:var(--muted); margin-bottom:16px; font-weight:500; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--muted); font-weight:600; cursor:pointer; user-select:none; white-space:nowrap; }
th:hover { color:var(--accent); }
th .sort-arrow { margin-left:4px; font-size:10px; }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
tr:hover td { background:rgba(99,102,241,0.05); }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-spring { background:rgba(34,197,94,0.15); color:#22c55e; }
.badge-summer { background:rgba(245,158,11,0.15); color:#f59e0b; }
.badge-fall { background:rgba(236,72,153,0.15); color:#ec4899; }
.badge-winter { background:rgba(34,211,238,0.15); color:#22d3ee; }
.sample-note { text-align:center; color:var(--muted); font-size:11px; margin-top:16px; padding:10px; border:1px dashed var(--border); border-radius:8px; }
canvas { max-height:300px; }
@media(max-width:768px) { .charts { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="dashboard">
  <header>
    <h1>Dashboard for <span>Bike Demand</span> UIUC</h1>
    <div class="filters">
      <select id="filterYear"><option value="all">All Years</option><option value="1">Year 1 (2011)</option><option value="2">Year 2 (2012)</option></select>
      <select id="filterSeason"><option value="all">All Seasons</option><option value="1">Winter</option><option value="2">Spring</option><option value="3">Summer</option><option value="4">Fall</option></select>
      <select id="filterDay"><option value="all">All Days</option><option value="1">Working Days</option><option value="0">Weekends/Holidays</option></select>
    </div>
  </header>
  <section class="kpis" id="kpis"></section>
  <section class="charts">
    <div class="chart-card full"><h3>Daily Total Demand Over Time</h3><canvas id="trendChart"></canvas></div>
    <div class="chart-card"><h3>Monthly Average Demand</h3><canvas id="monthlyChart"></canvas></div>
    <div class="chart-card"><h3>Demand by Season</h3><canvas id="seasonChart"></canvas></div>
    <div class="chart-card"><h3>Casual vs Registered Split</h3><canvas id="splitChart"></canvas></div>
    <div class="chart-card"><h3>Temperature vs Demand</h3><canvas id="scatterChart"></canvas></div>
  </section>
  <section class="table-section">
    <h3>Daily Records <span id="tableCount" style="color:var(--accent)"></span></h3>
    <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
  </section>
  <div class="sample-note">University of Illinois Urbana-Champaign &middot; BikeDemandDaily &middot; 456 daily records &middot; Jan 2011 &ndash; Mar 2012</div>
</div>

const seasonNames = {1:'Winter',2:'Spring',3:'Summer',4:'Fall'};
const seasonClasses = {1:'winter',2:'spring',3:'summer',4:'fall'};
const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let charts = {};
let sortCol = 'date';
let sortDir = -1;

function fmt(n) { return n.toLocaleString('en-US'); }
function pct(a,b) { return b===0?'N/A':((a-b)/b*100).toFixed(1); }

function getFiltered() {
  let d = DATA;
  const y = document.getElementById('filterYear').value;
  const s = document.getElementById('filterSeason').value;
  const w = document.getElementById('filterDay').value;
  if (y !== 'all') d = d.filter(r => r.year == y);
  if (s !== 'all') d = d.filter(r => r.season == s);
  if (w !== 'all') d = d.filter(r => r.workingday == w);
  return d;
}

function updateKPIs(data) {
  const total = data.reduce((s,r) => s+r.Total, 0);
  const avg = data.length ? total/data.length : 0;
  const casual = data.reduce((s,r) => s+r.Casual, 0);
  const registered = data.reduce((s,r) => s+r.Registered, 0);
  const avgTemp = data.length ? data.reduce((s,r) => s+r.meanatemp, 0)/data.length : 0;
  const peakDay = data.length ? data.reduce((a,b) => b.Total>a.Total?b:a) : null;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="label">Total Demand</div><div class="value">${fmt(total)}</div><div class="sub">${fmt(data.length)} days</div></div>
    <div class="kpi"><div class="label">Daily Average</div><div class="value">${fmt(Math.round(avg))}</div><div class="sub">riders/day</div></div>
    <div class="kpi"><div class="label">Casual / Registered</div><div class="value">${total?Math.round(casual/total*100):0}% / ${total?Math.round(registered/total*100):0}%</div><div class="sub">${fmt(casual)} / ${fmt(registered)}</div></div>
    <div class="kpi"><div class="label">Avg Temperature</div><div class="value">${avgTemp.toFixed(1)}&deg;</div><div class="sub">Mean apparent temp</div></div>
    <div class="kpi"><div class="label">Peak Day</div><div class="value">${peakDay?fmt(peakDay.Total):'-'}</div><div class="sub">${peakDay?peakDay.date:''}</div></div>
  `;
}

function updateCharts(data) {
  // Trend chart
  const sorted = [...data].sort((a,b) => a.Index - b.Index);
  if(charts.trend) charts.trend.destroy();
  charts.trend = new Chart(document.getElementById('trendChart'), {
    type:'line',
    data:{
      labels:sorted.map(r=>r.date),
      datasets:[
        {label:'Total',data:sorted.map(r=>r.Total),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.1)',fill:true,tension:0.3,pointRadius:0,borderWidth:2},
        {label:'Registered',data:sorted.map(r=>r.Registered),borderColor:'#22d3ee',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,4]},
        {label:'Casual',data:sorted.map(r=>r.Casual),borderColor:'#f59e0b',backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,4]}
      ]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#8b8fa3',usePointStyle:true,pointStyle:'circle',padding:20}}},scales:{x:{ticks:{color:'#8b8fa3',maxTicksLimit:12},grid:{color:'#2a2d3a'}},y:{ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}}}}
  });

  // Monthly chart
  const monthData = {};
  data.forEach(r => { if(!monthData[r.month]) monthData[r.month]={sum:0,count:0}; monthData[r.month].sum+=r.Total; monthData[r.month].count++; });
  const mLabels = Object.keys(monthData).sort((a,b)=>a-b);
  if(charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(document.getElementById('monthlyChart'), {
    type:'bar',
    data:{
      labels:mLabels.map(m=>monthNames[m-1]),
      datasets:[{label:'Avg Daily Demand',data:mLabels.map(m=>Math.round(monthData[m].sum/monthData[m].count)),backgroundColor:'rgba(99,102,241,0.7)',borderRadius:6}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b8fa3'},grid:{display:false}},y:{ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}}}}
  });

  // Season doughnut
  const seasonData = {};
  data.forEach(r => { if(!seasonData[r.season]) seasonData[r.season]=0; seasonData[r.season]+=r.Total; });
  const sLabels = Object.keys(seasonData).sort();
  if(charts.season) charts.season.destroy();
  charts.season = new Chart(document.getElementById('seasonChart'), {
    type:'doughnut',
    data:{
      labels:sLabels.map(s=>seasonNames[s]),
      datasets:[{data:sLabels.map(s=>seasonData[s]),backgroundColor:['#22d3ee','#22c55e','#f59e0b','#ec4899'],borderWidth:0}]
    },
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#8b8fa3',usePointStyle:true,pointStyle:'circle',padding:16}}}}
  });

  // Casual vs Registered stacked by season
  const splitData = {casual:{},reg:{}};
  data.forEach(r => {
    const s = seasonNames[r.season];
    if(!splitData.casual[s]) { splitData.casual[s]=0; splitData.reg[s]=0; }
    splitData.casual[s]+=r.Casual; splitData.reg[s]+=r.Registered;
  });
  const splitLabels = Object.keys(splitData.casual);
  if(charts.split) charts.split.destroy();
  charts.split = new Chart(document.getElementById('splitChart'), {
    type:'bar',
    data:{
      labels:splitLabels,
      datasets:[
        {label:'Casual',data:splitLabels.map(s=>splitData.casual[s]),backgroundColor:'rgba(245,158,11,0.7)',borderRadius:4},
        {label:'Registered',data:splitLabels.map(s=>splitData.reg[s]),backgroundColor:'rgba(99,102,241,0.7)',borderRadius:4}
      ]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#8b8fa3',usePointStyle:true,pointStyle:'circle'}}},scales:{x:{stacked:true,ticks:{color:'#8b8fa3'},grid:{display:false}},y:{stacked:true,ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}}}}
  });

  // Scatter: temp vs demand
  if(charts.scatter) charts.scatter.destroy();
  charts.scatter = new Chart(document.getElementById('scatterChart'), {
    type:'scatter',
    data:{
      datasets:[{
        label:'Daily Demand',
        data:data.map(r=>({x:r.meanatemp,y:r.Total})),
        backgroundColor: data.map(r => {
          const colors = {1:'rgba(34,211,238,0.5)',2:'rgba(34,197,94,0.5)',3:'rgba(245,158,11,0.5)',4:'rgba(236,72,153,0.5)'};
          return colors[r.season];
        }),
        pointRadius:4
      }]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'Mean Temp',color:'#8b8fa3'},ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}},y:{title:{display:true,text:'Total Demand',color:'#8b8fa3'},ticks:{color:'#8b8fa3'},grid:{color:'#2a2d3a'}}}}
  });
}

function updateTable(data) {
  const cols = [
    {key:'date',label:'Date'},{key:'season',label:'Season'},{key:'workingday',label:'Day Type'},
    {key:'meanatemp',label:'Temp'},{key:'meanhumidity',label:'Humidity'},
    {key:'meanwindspeed',label:'Wind'},{key:'Casual',label:'Casual'},{key:'Registered',label:'Registered'},{key:'Total',label:'Total'}
  ];

  document.getElementById('tableCount').textContent = `(${data.length} records)`;
  document.getElementById('tableHead').innerHTML = '<tr>' + cols.map(c =>
    `<th onclick="sortTable('${c.key}')">${c.label}<span class="sort-arrow">${sortCol===c.key?(sortDir===1?'▲':'▼'):''}</span></th>`
  ).join('') + '</tr>';

  const sorted = [...data].sort((a,b) => {
    let va=a[sortCol], vb=b[sortCol];
    if(typeof va==='string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  document.getElementById('tableBody').innerHTML = sorted.slice(0,100).map(r => `<tr>
    <td>${r.date}</td>
    <td><span class="badge badge-${seasonClasses[r.season]}">${seasonNames[r.season]}</span></td>
    <td>${r.workingday?'Working':'Weekend/Holiday'}</td>
    <td>${r.meanatemp.toFixed(1)}&deg;</td>
    <td>${r.meanhumidity.toFixed(0)}%</td>
    <td>${r.meanwindspeed.toFixed(1)}</td>
    <td>${fmt(r.Casual)}</td>
    <td>${fmt(r.Registered)}</td>
    <td><strong>${fmt(r.Total)}</strong></td>
  </tr>`).join('');
}

function sortTable(col) {
  if(sortCol===col) sortDir *= -1;
  else { sortCol=col; sortDir=-1; }
  updateTable(getFiltered());
}

function refresh() {
  const d = getFiltered();
  updateKPIs(d);
  updateCharts(d);
  updateTable(d);
}

document.getElementById('filterYear').addEventListener('change', refresh);
document.getElementById('filterSeason').addEventListener('change', refresh);
document.getElementById('filterDay').addEventListener('change', refresh);

refresh();
</script>
</body>
